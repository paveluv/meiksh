disallowed-types = [
    { path = "std::fs::File", reason = "Use sys:: wrappers instead of std::fs" },
    { path = "std::fs::OpenOptions", reason = "Use sys::open_file instead of std::fs::OpenOptions" },
    { path = "std::fs::DirEntry", reason = "Use sys::read_dir_entries instead of std::fs" },
    { path = "std::fs::ReadDir", reason = "Use sys::read_dir_entries instead of std::fs" },
    { path = "std::fs::Metadata", reason = "Use sys::stat_path instead of std::fs::metadata" },
    { path = "std::process::Command", reason = "Use sys::spawn_child/run_to_status/capture_child_output instead" },
    { path = "std::process::Child", reason = "Use sys::ChildHandle instead of std::process::Child" },
    { path = "std::process::Stdio", reason = "Use raw fd operations through sys:: instead" },
    { path = "std::process::ExitStatus", reason = "Use sys::ChildExitStatus instead" },
]

disallowed-methods = [
    { path = "std::env::set_current_dir", reason = "Use sys::change_dir instead" },
    { path = "std::env::current_dir", reason = "Use sys::get_cwd instead" },
    { path = "std::env::current_exe", reason = "Use sys::read_link or shell.current_exe instead" },
    { path = "std::fs::read_to_string", reason = "Use sys::read_file instead" },
    { path = "std::fs::write", reason = "Use sys::open_file + sys::write_all_fd instead" },
    { path = "std::fs::metadata", reason = "Use sys::stat_path instead" },
    { path = "std::fs::read_dir", reason = "Use sys::read_dir_entries instead" },
    { path = "std::fs::create_dir", reason = "Use libc::mkdir through sys:: instead" },
    { path = "std::fs::remove_file", reason = "Use sys::unlink_file instead" },
    { path = "std::path::Path::exists", reason = "Use sys::file_exists instead" },
    { path = "std::path::Path::is_file", reason = "Use sys::is_regular_file instead" },
    { path = "std::path::Path::is_dir", reason = "Use sys::is_directory instead" },
    { path = "std::path::Path::metadata", reason = "Use sys::stat_path instead" },
    { path = "std::path::Path::canonicalize", reason = "Use sys::canonicalize instead" },
    { path = "std::io::Error::last_os_error", reason = "Use sys::last_error() instead for mockability" },
]
