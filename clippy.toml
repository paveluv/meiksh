    { path = "std::env::var", reason = "Use sys::env_var instead" },
    { path = "std::env::vars", reason = "Use sys::env_vars instead" },
    { path = "std::env::set_var", reason = "Use sys::env_set_var instead" },
    { path = "std::env::remove_var", reason = "Use sys::env_unset_var instead" },
    { path = "std::env::args_os", reason = "Use sys::env_args_os instead" },
    { path = "std::env::args", reason = "Use sys::env_args_os instead" },
    { path = "std::fs::read_to_string", reason = "Use sys::read_file instead" },
    { path = "std::fs::write", reason = "Use sys::open_file + sys::write_all_fd instead" },
    { path = "std::fs::metadata", reason = "Use sys::stat_path instead" },
    { path = "std::fs::read_dir", reason = "Use sys::read_dir_entries instead" },
    { path = "std::fs::create_dir", reason = "Use sys::mkdir through sys:: instead" },
