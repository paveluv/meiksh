disallowed-types = [
    { path = "std::fs::File", reason = "Use sys:: wrappers instead of std::fs" },
    { path = "std::fs::OpenOptions", reason = "Use sys::open_file instead of std::fs::OpenOptions" },
    { path = "std::fs::DirEntry", reason = "Use sys::read_dir_entries instead of std::fs" },
    { path = "std::fs::ReadDir", reason = "Use sys::read_dir_entries instead of std::fs" },
    { path = "std::fs::Metadata", reason = "Use sys::stat_path instead of std::fs::metadata" },
    { path = "std::process::Command", reason = "Use sys::spawn_child instead" },
    { path = "std::process::Child", reason = "Use sys::ChildHandle instead of std::process::Child" },
    { path = "std::process::Stdio", reason = "Use raw fd operations through sys:: instead" },
    { path = "std::process::ExitStatus", reason = "Use sys::ChildExitStatus instead" },
    { path = "std::io::Error", reason = "Use sys::SysError instead" },
    { path = "std::io::Result", reason = "Use sys::SysResult instead" },
]

disallowed-macros = [
    { path = "std::println", reason = "Use sys_println! (routes through sys::write_all_fd) instead" },
    { path = "std::eprintln", reason = "Use sys_eprintln! (routes through sys::write_all_fd) instead" },
]

